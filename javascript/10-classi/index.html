<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lezione 48 - Esercizi JS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .box {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-top: 0.7rem;
        }

        input, button {
            margin-top: 0.3rem;
            padding: 0.4rem;
        }
    </style>
</head>
<body>
    <h1>Lezione 48 - Programmazione ad oggetti</h1>

    <div class="box">
        <h2>Conto bancario</h2>

        <label for="nome">Nome intestatario</label>
        <input type="text" id="nome" placeholder="Es: Mario">

        <label for="saldo">Saldo iniziale</label>
        <input type="number" id="saldo" placeholder="Es: 100">

        <div>
            <button id="creaBtn">Crea conto</button>
        </div>
    </div>

    <div class="box">
        <h2>Operazioni</h2>

        <label for="importo">Importo</label>
        <input type="number" id="importo" placeholder="Es: 20">

        <div>
            <button id="depositaBtn">Deposita</button>
            <button id="prelevaBtn">Preleva</button>
        </div>
    </div>

    <div class="box">
        <h2>Risultato</h2>
        <p id="output">Nessun conto creato.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
