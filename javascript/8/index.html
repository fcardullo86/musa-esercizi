<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lezione 44 - Esercizi JS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .box {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-top: 0.7rem;
        }

        input, select, button {
            margin-top: 0.3rem;
            padding: 0.4rem;
        }

        .dark {
            background-color: #222;
            color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>Lezione 44 - Cookie (senza banner)</h1>

    <div class="box">
        <h2>Preferenze utente</h2>

        <label for="nomeUtente">Nome</label>
        <input type="text" id="nomeUtente" placeholder="Es: Giulia">

        <label for="tema">Tema</label>
        <select id="tema">
            <option value="chiaro">Chiaro</option>
            <option value="scuro">Scuro</option>
        </select>

        <div style="margin-top: 1rem;">
            <button id="salvaBtn">Salva preferenze</button>
        </div>
    </div>

    <div class="box">
        <h2>Stato pagina</h2>
        <p id="messaggio">Nessun dato caricato.</p>
        <p id="visite">Visite: -</p>
        <p id="ultimaVisita">Ultima visita: -</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
